<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}遊戲誌{% endblock %} — 中文游戏杂志数字归档</title>
  <link rel="stylesheet" href="{{ base }}static/style.css">
  <script>window.__BASE__ = "{{ base }}";</script>
</head>
<body>
  <nav class="site-nav">
    <a class="brand" href="{{ base }}">遊戲誌</a>
    <div class="nav-links">
      <a href="{{ base }}">首页</a>
      <!-- future: 游戏索引, 译名表 -->
    </div>
    <a class="search-link" href="{{ base }}search/">搜索</a>
  </nav>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    <p>中文游戏杂志数字归档计划</p>
  </footer>
  <script>
  document.addEventListener('click', function(e) {
    if (e.target.matches('.scan-figure img')) {
      e.target.classList.toggle('zoomed');
    }
  });
  </script>
</body>
</html>
