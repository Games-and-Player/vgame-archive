{% extends "base.html" %}
{% block title %}搜索{% endblock %}

{% block content %}
<h2>搜索</h2>

<input type="text" id="search-input" class="search-box" placeholder="搜索文章、游戏…" autofocus>

<div class="search-filters">
  <button class="filter active" data-filter="all">全部</button>
  <button class="filter" data-filter="game">游戏</button>
  <button class="filter" data-filter="author">作者</button>
  <button class="filter" data-filter="section">栏目</button>
</div>

<div id="search-results" class="search-results"></div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="{{ base }}static/search.js"></script>
{% endblock %}
